<!DOCTYPE html>
<HTML lang="en">

<HEAD>
    <TITLE>HBNB</TITLE>
</HEAD>

<BODY>
    <H1>States</H1>
    <UL>
        {% for state, cities in state_with_cities %}
        <LI>{{ state.id }}: <B>{{ state.name }}</B>
            {% if cities %}
            <UL>
                {% for city in cities %}
                <LI>{{ city.id }}: <B>{{ city.name }}</B></LI>
                {% endfor %}
            </UL>
            {% else %}
            <UL>
            </UL>
            {% endif %}
        </LI>
        {% endfor %}
    </UL>
</BODY>

</HTML>
